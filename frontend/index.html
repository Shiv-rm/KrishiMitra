<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiMitra - Smart Farming Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <!-- <span class="icon">🌱</span> -->
                <h1>KrishiMitra</h1>
            </div>
            <p class="tagline">Empowering farmers with data-driven insights</p>
        </header>

        <main>
            <div class="card main-card">
                <h2>Field Analysis</h2>
                <p>Get real-time soil and climate data for your specific location.</p>
                
                <div class="action-area">
                    <button id="get-location-btn" class="primary-btn">
                        <!-- <span class="btn-icon">📍</span> -->
                        Analyze My Location
                    </button>
                    <p id="status-message" class="status"></p>
                </div>

                <div id="results-container" class="results hidden">
                    <!-- Results will be injected here -->
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 KrishiMitra. Advanced Agricultural Intelligence.</p>
        </footer>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
