<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiMitra - Smart Farming Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <header>
            <!-- Language Toggle -->
            <div class="lang-toggle" id="lang-toggle" role="group" aria-label="Language switcher">
                <button class="lang-btn active" id="btn-en" data-lang="en">EN</button>
                <button class="lang-btn"        id="btn-hi" data-lang="hi">हिं</button>
            </div>

            <div class="logo">
                <h1>KrishiMitra</h1>
            </div>
            <p class="tagline" data-i18n="tagline">Empowering farmers with data-driven insights</p>
        </header>

        <main>
            <div class="card main-card">
                <h2 data-i18n="cardTitle">Field Analysis</h2>
                <p  data-i18n="cardDesc">Get real-time soil and climate data for your specific location.</p>

                <div class="action-area">
                    <button id="get-location-btn" class="primary-btn">
                        <span data-i18n="analyzeBtn">Analyze My Location</span>
                    </button>
                    <p id="status-message" class="status"></p>
                </div>

                <div id="results-container" class="results hidden">
                    <!-- Results will be injected here -->
                </div>
            </div>
        </main>

        <footer>
            <p data-i18n="footer">© 2026 KrishiMitra. Advanced Agricultural Intelligence.</p>
        </footer>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
